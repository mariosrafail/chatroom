<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ff2d70" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SoulMate Chat" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>SoulMate Chat</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/chat-heart.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-app" aria-label="Chat room">
        <header class="topbar">
          <button class="icon-button" id="menuButton" type="button" aria-label="Open calendar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <div class="room-title">
            <span id="activeRoom">SoulMate Chat</span>
          </div>
          <button class="avatar-button" id="profileButton" aria-label="Profile">
            <span id="avatarInitial">M</span>
          </button>
        </header>

        <div class="calendar-scrim" id="calendarScrim" hidden></div>
        <aside class="calendar-panel" id="calendarPanel" aria-label="Chat calendar">
          <div class="panel-head">
            <div>
              <strong>Calendar</strong>
              <small>Daily chats</small>
            </div>
            <button class="icon-button panel-close" id="closeCalendarButton" type="button" aria-label="Close calendar">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 6 6 18M6 6l12 12" />
              </svg>
            </button>
          </div>

          <button class="today-button" id="todayButton" type="button">Today</button>

          <label class="city-control">
            Location
            <select id="citySelect">
              <option value="athens">Athens</option>
              <option value="thessaloniki">Thessaloniki</option>
              <option value="patra">Patra</option>
              <option value="heraklion">Heraklion</option>
            </select>
          </label>

          <div class="sun-card" id="sunCard">
            <span id="sunMode">Daylight</span>
            <small id="sunTimes">Sunrise --:-- · Sunset --:--</small>
            <small id="dayLength">Day length --h --m</small>
          </div>

          <div class="day-list" id="dayList" aria-label="Saved chat days"></div>

          <button class="notify-row" id="notifyButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9" />
              <path d="M13.7 21a2 2 0 0 1-3.4 0" />
            </svg>
            <span>Enable notifications</span>
          </button>
        </aside>

        <section class="messages" id="messages" aria-live="polite"></section>

        <form class="composer" id="messageForm">
          <label class="sr-only" for="messageInput">Message</label>
          <textarea id="messageInput" rows="1" placeholder="Write a message..." autocomplete="off"></textarea>
          <button class="send-button" type="submit" aria-label="Send">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m22 2-7 20-4-9-9-4 20-7Z" />
              <path d="M22 2 11 13" />
            </svg>
          </button>
        </form>
      </section>
    </main>

    <dialog class="profile-dialog" id="profileDialog">
      <form method="dialog" class="profile-card" id="profileForm">
        <div>
          <h1 id="profileTitle">Enter name</h1>
          <p id="profileHelp">Choose a name before you start chatting.</p>
        </div>
        <label>
          Name
          <input id="nameInput" maxlength="24" placeholder="Your name" />
        </label>
        <div class="dialog-actions">
          <button class="secondary-button" type="button" id="cancelProfileButton">Cancel</button>
          <button class="primary-button" id="saveProfileButton" value="default">Start</button>
        </div>
      </form>
    </dialog>

    <div class="message-menu" id="messageMenu" hidden>
      <button type="button" id="copyMessageButton">Copy</button>
      <button type="button" id="editMessageButton">Edit</button>
      <button type="button" id="deleteMessageButton" class="danger-action">Delete</button>
    </div>

    <dialog class="profile-dialog" id="editDialog">
      <form method="dialog" class="profile-card" id="editForm">
        <div>
          <h1>Edit message</h1>
          <p>Only today's messages can be changed.</p>
        </div>
        <label>
          Message
          <textarea id="editInput" rows="4" maxlength="1000"></textarea>
        </label>
        <div class="dialog-actions">
          <button class="secondary-button" type="button" id="cancelEditButton">Cancel</button>
          <button class="primary-button" id="saveEditButton" value="default">Save</button>
        </div>
      </form>
    </dialog>

    <dialog class="profile-dialog" id="historyDialog">
      <form method="dialog" class="profile-card">
        <div>
          <h1>Edit history</h1>
          <p>Previous versions of this message.</p>
        </div>
        <div class="history-list" id="historyList"></div>
        <div class="dialog-actions single-action">
          <button class="primary-button" value="default">Done</button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="notifyToast" hidden></div>

    <script src="app.js"></script>
  </body>
</html>
