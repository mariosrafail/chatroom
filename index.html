<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Your Soul Mate <3" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Your Soul Mate <3</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/chat-heart.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-pending">
    <section class="auth-gate" id="authGate" aria-labelledby="authTitle">
      <form class="auth-card" id="authForm">
        <div class="auth-heart" aria-hidden="true">♥</div>
        <div>
          <h1 id="authTitle">Private chat</h1>
          <p>Enter the password to continue.</p>
        </div>
        <label for="passwordInput">Password</label>
        <input
          id="passwordInput"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          autofocus
        />
        <p class="auth-error" id="authError" role="alert" hidden></p>
        <button class="primary-button auth-submit" id="authSubmit" type="submit">Unlock</button>
      </form>
    </section>

    <main class="app-shell">
      <section class="chat-app" aria-label="Chat room">
        <header class="topbar">
          <button class="icon-button" id="menuButton" type="button" aria-label="Open calendar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <div class="room-title">
            <span id="activeRoom">Your Soul Mate &lt;3</span>
          </div>
          <button class="avatar-button" id="profileButton" aria-label="Profile">
            <span id="avatarInitial">M</span>
          </button>
        </header>

        <div class="calendar-scrim" id="calendarScrim" hidden></div>
        <aside class="calendar-panel" id="calendarPanel" aria-label="Chat calendar">
          <div class="panel-head">
            <div>
              <strong>Calendar</strong>
              <small>Daily chats</small>
            </div>
            <button class="icon-button panel-close" id="closeCalendarButton" type="button" aria-label="Close calendar">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 6 6 18M6 6l12 12" />
              </svg>
            </button>
          </div>

          <button class="today-button" id="todayButton" type="button">Today</button>

          <div class="day-list" id="dayList" aria-label="Saved chat days"></div>

        </aside>

        <section class="messages" id="messages" aria-live="polite"></section>

        <form class="composer" id="messageForm">
          <label class="sr-only" for="messageInput">Message</label>
          <textarea
            id="messageInput"
            rows="1"
            maxlength="20000"
            placeholder="Write a message..."
            autocomplete="off"
          ></textarea>
          <button class="send-button" type="submit" aria-label="Send">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m22 2-7 20-4-9-9-4 20-7Z" />
              <path d="M22 2 11 13" />
            </svg>
          </button>
        </form>
      </section>
    </main>

    <dialog class="profile-dialog" id="profileDialog">
      <form method="dialog" class="profile-card" id="profileForm">
        <div>
          <h1 id="profileTitle">Enter name</h1>
          <p id="profileHelp">Choose a name before you start chatting.</p>
        </div>
        <label>
          Name
          <input id="nameInput" maxlength="24" placeholder="Your name" />
        </label>
        <div class="dialog-actions">
          <button class="secondary-button" type="button" id="cancelProfileButton">Cancel</button>
          <button class="primary-button" id="saveProfileButton" value="default">Start</button>
        </div>
      </form>
    </dialog>

    <dialog class="profile-dialog" id="historyDialog">
      <form method="dialog" class="profile-card">
        <div>
          <h1>Edit history</h1>
          <p>Previous versions of this message.</p>
        </div>
        <div class="history-list" id="historyList"></div>
        <div class="dialog-actions single-action">
          <button class="primary-button" value="default">Done</button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="notifyToast" hidden></div>

    <script src="app.js"></script>
  </body>
</html>
