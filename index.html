<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ff2d70" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SoulMate Chat" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>SoulMate Chat</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/chat-heart.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-app" aria-label="Chat room">
        <header class="topbar">
          <div class="topbar-spacer" aria-hidden="true"></div>
          <div class="room-title">
            <span id="activeRoom">SoulMate Chat</span>
          </div>
          <button class="avatar-button" id="profileButton" aria-label="Profile">
            <span id="avatarInitial">M</span>
          </button>
        </header>

        <section class="messages" id="messages" aria-live="polite"></section>

        <form class="composer" id="messageForm">
          <button class="icon-button" type="button" id="quickButton" aria-label="Quick message">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m12 3-1.9 5.8H4l5 3.6-1.9 5.8 4.9-3.6 5 3.6-1.9-5.8 4.9-3.6h-6.1L12 3Z" />
            </svg>
          </button>
          <label class="sr-only" for="messageInput">Message</label>
          <textarea id="messageInput" rows="1" placeholder="Write a message..." autocomplete="off"></textarea>
          <button class="send-button" type="submit" aria-label="Send">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m22 2-7 20-4-9-9-4 20-7Z" />
              <path d="M22 2 11 13" />
            </svg>
          </button>
        </form>
      </section>
    </main>

    <dialog class="profile-dialog" id="profileDialog">
      <form method="dialog" class="profile-card" id="profileForm">
        <div>
          <h1 id="profileTitle">Enter name</h1>
          <p id="profileHelp">Choose a name before you start chatting.</p>
        </div>
        <label>
          Name
          <input id="nameInput" maxlength="24" placeholder="Your name" />
        </label>
        <div class="dialog-actions">
          <button class="secondary-button" type="button" id="cancelProfileButton">Cancel</button>
          <button class="primary-button" id="saveProfileButton" value="default">Start</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
